    <ul data-repeat="tasks" data-repeat-item="task">

      <li class="imr-checklist-item"><span class="imr-check" aria-hidden="true"></span><span>Umbruchregel dokumentiert <span class="imr-status-label">ERLEDIGT</span></span></li>
